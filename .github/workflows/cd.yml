name: CD — Build & Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      services:
        description: 'Services to deploy (comma-separated, leave empty for all)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ecommerce

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            context: backend/services/auth-service
          - service: product-service
            context: backend/services/product-service
          - service: cart-service
            context: backend/services/cart-service
          - service: order-service
            context: backend/services/order-service
          - service: payment-service
            context: backend/services/payment-service
          - service: api-gateway
            context: backend/api-gateway
          - service: frontend
            context: frontend
            build-args: NEXT_PUBLIC_API_URL=https://api.ecommerce.local

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build-args || '' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set Kubernetes context
        run: |
          echo "⚠️  Configure kubeconfig from GitHub Secrets before enabling this step."
          echo "  Required secrets: KUBE_CONFIG (base64-encoded kubeconfig)"
          echo "Skipping actual deploy in this template."
        # Uncomment and set KUBE_CONFIG secret to enable real deploys:
        # run: |
        #   echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        #   export KUBECONFIG=/tmp/kubeconfig

      # Uncomment when KUBE_CONFIG is available:
      # - name: Update image tags & deploy
      #   run: |
      #     export KUBECONFIG=/tmp/kubeconfig
      #     for svc in auth product cart order payment; do
      #       kubectl set image deployment/${svc}-service \
      #         ${svc}-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${svc}-service:${{ github.sha }} \
      #         -n ecommerce
      #     done
      #     kubectl set image deployment/api-gateway \
      #       api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api-gateway:${{ github.sha }} \
      #       -n ecommerce
      #     kubectl set image deployment/frontend \
      #       frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} \
