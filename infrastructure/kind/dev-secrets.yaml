# ⚠️  DEV-ONLY secrets — NEVER use in production
# These match the secretKeyRef names used by the K8s deployment manifests.
# This file serves as a static fallback; for local dev, prefer running:
#   make kind-secrets  (sources .env.kind for customisable values)
#
# ── auth-service + api-gateway ───────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: ecommerce
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://auth_user:change_me_auth@auth-db:5432/auth_db"
  jwt-secret: "super_secret_dev_key_change_me"
---
# ── auth Postgres StatefulSet ─────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: auth-db-secrets
  namespace: ecommerce
type: Opaque
stringData:
  username: "auth_user"
  password: "change_me_auth"
---
# ── product-service ───────────────────────────────────────────
apiVersion: v1
