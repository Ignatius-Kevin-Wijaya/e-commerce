---
# ── product Postgres StatefulSet ──────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: product-db-secrets
  namespace: ecommerce
type: Opaque
stringData:
  username: "product_user"
  password: "change_me_product"
---
# ── cart-service ──────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cart-secrets
  namespace: ecommerce
type: Opaque
stringData:
  redis-url: "redis://redis:6379/0"
---
