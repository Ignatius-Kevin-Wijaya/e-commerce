# ── payment-service ───────────────────────────────────────────
# ⚠️  Replace stripe-secret-key and stripe-webhook-secret with real
#     Stripe test keys from https://dashboard.stripe.com/test/apikeys
#     or set them in .env.kind and run `make kind-secrets`.
apiVersion: v1
kind: Secret
metadata:
  name: payment-secrets
  namespace: ecommerce
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://order_user:change_me_order@order-db:5432/order_db"
  stripe-secret-key: "sk_test_fake_key"
  stripe-webhook-secret: "whsec_fake_secret"
