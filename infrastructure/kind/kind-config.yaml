# KIND cluster config for e-commerce microservices
# Creates a multi-node cluster with ingress-ready port mappings
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ecommerce

nodes:
  # ── Control Plane ──────────────────────────────────────────
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP  → host:80   (NGINX Ingress)
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # HTTPS → host:443  (NGINX Ingress)
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Prometheus NodePort
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
      # Grafana NodePort
      - containerPort: 30030
        hostPort: 30030
        protocol: TCP

  # ── Workers ────────────────────────────────────────────────
  - role: worker
    labels:
      role: workload
  - role: worker
    labels:
      role: workload
