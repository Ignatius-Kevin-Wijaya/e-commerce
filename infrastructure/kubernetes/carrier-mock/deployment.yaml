apiVersion: apps/v1
kind: Deployment
metadata:
  name: carrier-mock-service
  namespace: ecommerce
  labels:
    app: carrier-mock-service
spec:
  # Fixed at 5 replicas — carrier-mock is controlled test infrastructure, not the service
  # under test. At 60 RPS × 3 carrier fan-out = 180 carrier RPS; 5 pods = 36 RPS/pod,
  # well within single-uvicorn asyncio capacity. This ensures the mock dependency is
  # never the bottleneck, isolating autoscaling behavior of shipping-rate-service.
  replicas: 5
  selector:
    matchLabels:
      app: carrier-mock-service
  template:
    metadata:
      labels:
        app: carrier-mock-service
    spec:
      containers:
        - name: carrier-mock-service
          image: ecommerce.azurecr.io/carrier-mock-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8007
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: INTERNAL_GATEWAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: internal-gateway-secret
            - name: CARRIER_DELAY_SCALE
              value: "1.0"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8007
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: 8007
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
