# H1: HPA Default — auth-service
# CPU-based HPA with default Kubernetes behavior policy
# targetCPU: 70%, no behavior field (uses K8s defaults)
# minReplicas: 1, maxReplicas: 5
#
# Purpose: How HPA performs "out of the box" for CPU-bound service (bcrypt)
# Expected: Should trigger for auth-service since bcrypt is CPU-intensive
#
# Usage:
#   kubectl apply -f b1-underprovisioned.yaml -n ecommerce   # Reset to 1 replica first
#   kubectl apply -f h1-hpa-default.yaml -n ecommerce
# Cleanup:
#   kubectl delete hpa auth-service-hpa-default -n ecommerce
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa-default
  namespace: ecommerce
  labels:
    experiment: h1-hpa-default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  # No behavior field — uses Kubernetes defaults
