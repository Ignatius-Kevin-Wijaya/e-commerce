# K1: KEDA with Prometheus Trigger — auth-service
# Event-driven scaling based on HTTP request rate via Prometheus
# threshold: 5 RPS/pod (must match H3 exactly for fair comparison)
# pollingInterval: 15s (matches HPA control loop interval for fairness)
# cooldownPeriod: 30s (matches H2/H3 scaleDown stabilization)
#
# PREREQUISITE: KEDA must be installed via AKS add-on:
#   az aks update --resource-group thesis-rg --name thesis-aks --enable-keda
#
# Purpose: Event-driven autoscaling for CPU-bound service
# Calibrated note (2026-04-12 recovery baseline):
#   Prometheus saw only ~9-10 req/s on a single saturated pod before resets/timeouts.
#   Triggering at 5 req/s lets request-based autoscaling react before the pod collapses.
# Expected: For CPU-bound auth-service, KEDA may show comparable performance
#   to HPA once scaling is calibrated to engage before saturation.
#
# Usage:
#   kubectl apply -f b1-underprovisioned.yaml -n ecommerce   # Reset to 1 replica first
#   kubectl apply -f k1-keda.yaml -n ecommerce
# Cleanup:
#   kubectl delete scaledobject auth-service-keda -n ecommerce
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: auth-service-keda
  namespace: ecommerce
  labels:
    experiment: k1-keda
spec:
  scaleTargetRef:
    name: auth-service
  minReplicaCount: 1        # Match HPA minReplicas for fair comparison
  maxReplicaCount: 5         # Match HPA maxReplicas for fair comparison
  cooldownPeriod: 30         # Match H2/H3 scaleDown stabilizationWindowSeconds
  pollingInterval: 15        # Match HPA control loop interval for fairness
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: http_requests_per_second
        # IMPORTANT: Query returns TOTAL rate across all pods.
        # KEDA internally computes: desiredReplicas = ceil(queryResult / threshold)
        # Example: 20 total RPS → ceil(20/5) = 4 replicas
        query: |
          sum(rate(http_requests_total{job="auth-service"}[1m]))
        threshold: "5"       # Same threshold as H3 — critical for fairness
