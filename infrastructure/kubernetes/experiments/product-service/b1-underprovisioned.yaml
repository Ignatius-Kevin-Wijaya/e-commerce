# B1: Under-provisioned Baseline — product-service
# Fixed at 1 replica, no autoscaling
# Purpose: Lower-bound baseline showing degradation without scaling
#
# Usage: kubectl apply -f b1-underprovisioned.yaml -n ecommerce
# Reset: kubectl delete -f b1-underprovisioned.yaml -n ecommerce
#
# This is a "no-op" config — the deployment already runs at replicas: 1.
# This file exists to make the experiment protocol explicit and scriptable.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ecommerce
  labels:
    app: product-service
    experiment: b1-underprovisioned
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: ecommerce.azurecr.io/product-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: product-secrets
                  key: database-url
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: INTERNAL_GATEWAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: internal-gateway-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
