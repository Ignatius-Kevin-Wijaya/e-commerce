# H3: HPA Custom Metric (Request-Rate) — shipping-rate-service
# Initial threshold is a starting point for live calibration and must match K1.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shipping-rate-service-hpa-custom
  namespace: ecommerce
  labels:
    experiment: h3-hpa-custom-metric
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shipping-rate-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "15"  # calibrated: VU=80 peak → 16.6 req/s/pod; threshold=15 fires at ~90% capacity, not at warm-up (~13 req/s)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 5
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
