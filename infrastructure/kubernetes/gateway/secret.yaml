apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
  namespace: ecommerce
type: Opaque
stringData:
  # Generate a strong secret before deploying to production:
  #   python -c "import secrets; print(secrets.token_hex(32))"
  # Then replace this placeholder value.
  internal-gateway-secret: "CHANGE_ME_BEFORE_DEPLOY_TO_PRODUCTION"
  cors-origins: "http://localhost:3000,http://ecommerce.local"
