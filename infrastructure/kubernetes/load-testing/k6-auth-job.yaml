# k6 Auth-Service Load Test Scripts — thesis recovery experiments
# Updated for the thesis recovery plan:
#   - Mixed auth traffic: 70% GET /auth/me + 30% POST /auth/login
#   - Token-pool setup retained for the /auth/me slice
#   - Env-driven BASE_RPS / PEAK_RPS for calibration ladders
#   - Higher k6 resources to avoid client-side A1 false failures
#
# Usage:
#   kubectl apply -f k6-auth-job.yaml                     # Creates ConfigMaps + Jobs
#   The experiment runner only applies the ConfigMaps, then clones the Job
#   templates locally to create per-run Jobs with calibrated env overrides.

---
# ── k6 Script: Auth Gradual Ramp ────────────────────────────────────────────
# Linear increase from BASE_RPS → PEAK_RPS over 5 minutes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-auth-script-gradual
  namespace: ecommerce
data:
  load-test.js: |
    import http from 'k6/http';
    import { check } from 'k6';
    import { SharedArray } from 'k6/data';

    const BASE_RPS = parseInt(__ENV.BASE_RPS || '20', 10);
    const PEAK_RPS = parseInt(__ENV.PEAK_RPS || '120', 10);
    const NUM_USERS = parseInt(__ENV.NUM_TEST_USERS || '120', 10);
    const AUTH_ME_PERCENT = parseInt(__ENV.AUTH_ME_PERCENT || '70', 10);
    const AUTH_LOGIN_PERCENT = parseInt(__ENV.AUTH_LOGIN_PERCENT || '30', 10);
    const MIX_TOTAL = Math.max(AUTH_ME_PERCENT + AUTH_LOGIN_PERCENT, 1);
    const AUTH_ME_THRESHOLD = AUTH_ME_PERCENT / MIX_TOTAL;
    const PREALLOCATED_VUS = Math.max(400, PEAK_RPS * 3);
    const MAX_VUS = Math.max(1000, PEAK_RPS * 6);

    export const options = {
      scenarios: {
        gradual_ramp: {
          executor: 'ramping-arrival-rate',
          startRate: BASE_RPS,
          timeUnit: '1s',
          preAllocatedVUs: PREALLOCATED_VUS,
          maxVUs: MAX_VUS,
          stages: [
            { duration: '2m', target: BASE_RPS },
            { duration: '5m', target: PEAK_RPS },
            { duration: '2m', target: PEAK_RPS },
            { duration: '3m', target: 0 },
          ],
        },
      },
      thresholds: {
        http_req_duration: ['p(95)<2000'],
        http_req_failed: ['rate<0.05'],
      },
    };

    const BASE_URL = __ENV.TARGET_URL || 'http://auth-service.ecommerce.svc.cluster.local:8001';
    const GATEWAY_SECRET = __ENV.INTERNAL_GATEWAY_SECRET || '';
    const JSON_HEADERS = {
      'Content-Type': 'application/json',
      'X-Internal-Gateway-Secret': GATEWAY_SECRET,
    };

    const testUsers = new SharedArray('users', function () {
      const users = [];
      for (let i = 0; i < NUM_USERS; i++) {
        users.push({
          email: `loadtest_user_${i}@example.com`,
          username: `loadtest_user_${i}`,
          password: 'LoadTest_P@ss_2026!',
        });
      }
      return users;
    });

    function randomUser() {
      return testUsers[Math.floor(Math.random() * testUsers.length)];
    }

    export function setup() {
      console.log(`Seeding and pre-authenticating ${NUM_USERS} users...`);
      const tokens = [];

      for (let i = 0; i < NUM_USERS; i++) {
        const user = testUsers[i];

        http.post(
          `${BASE_URL}/auth/register`,
          JSON.stringify({
            email: user.email,
            username: user.username,
            password: user.password,
            full_name: `Load Test User ${i}`,
          }),
          { headers: JSON_HEADERS }
        );

        const loginRes = http.post(
          `${BASE_URL}/auth/login`,
          JSON.stringify({ email: user.email, password: user.password }),
          { headers: JSON_HEADERS }
        );

        if (loginRes.status === 200) {
          try {
            const body = JSON.parse(loginRes.body);
            if (body.access_token) {
              tokens.push(body.access_token);
            }
          } catch (e) {
            console.warn(`Failed to parse login response for user ${i}`);
          }
        } else {
          console.warn(`Login failed for user ${i}: ${loginRes.status}`);
        }
      }

      if (tokens.length === 0) {
        throw new Error('No tokens obtained during setup');
      }

      console.log(`Pre-auth complete: ${tokens.length}/${NUM_USERS} tokens obtained`);
      return { tokens };
    }

    function runAuthMe(data) {
      const token = data.tokens[Math.floor(Math.random() * data.tokens.length)];
      const res = http.get(
        `${BASE_URL}/auth/me`,
        {
          headers: {
            'X-Internal-Gateway-Secret': GATEWAY_SECRET,
            Authorization: `Bearer ${token}`,
          },
        }
      );
      check(res, {
        'me status is 200': (r) => r.status === 200,
        'me returns user data': (r) => {
          try {
            return JSON.parse(r.body).email !== undefined;
          } catch (e) {
            return false;
          }
        },
        'me response time < 500ms': (r) => r.timings.duration < 500,
      });
    }

    function runLogin() {
      const user = randomUser();
      const res = http.post(
        `${BASE_URL}/auth/login`,
        JSON.stringify({ email: user.email, password: user.password }),
        { headers: JSON_HEADERS }
      );
      check(res, {
        'login status is 200': (r) => r.status === 200,
        'login returns access token': (r) => {
          try {
            return JSON.parse(r.body).access_token !== undefined;
          } catch (e) {
            return false;
          }
        },
        'login response time < 1000ms': (r) => r.timings.duration < 1000,
      });
    }

    export default function (data) {
      if (Math.random() < AUTH_ME_THRESHOLD) {
        runAuthMe(data);
        return;
      }
      runLogin();
    }

