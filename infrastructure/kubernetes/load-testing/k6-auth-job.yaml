---
# ── k6 Auth Job Template: Gradual Ramp ──────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-auth-test-gradual
  namespace: ecommerce
spec:
  template:
    metadata:
      labels:
        app: k6
        target: auth-service
    spec:
      containers:
        - name: k6
          image: grafana/k6:latest
          command: ["k6", "run", "--out", "json=/results/results.json", "/scripts/load-test.js"]
          env:
            - name: TARGET_URL
              value: "http://auth-service.ecommerce.svc.cluster.local:8001"
            - name: BASE_RPS
              value: "20"
            - name: PEAK_RPS
              value: "120"
            - name: AUTH_ME_PERCENT
              value: "70"
            - name: AUTH_LOGIN_PERCENT
              value: "30"
            - name: NUM_TEST_USERS
              value: "120"
            - name: INTERNAL_GATEWAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: internal-gateway-secret
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"
          volumeMounts:
            - name: k6-script
              mountPath: /scripts
            - name: k6-results
              mountPath: /results
      volumes:
        - name: k6-script
          configMap:
            name: k6-auth-script-gradual
        - name: k6-results
          emptyDir: {}
      restartPolicy: Never
  backoffLimit: 0

