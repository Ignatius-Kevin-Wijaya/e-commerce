---
# ── k6 Job Template: Gradual Ramp ───────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test-gradual
  namespace: ecommerce
spec:
  template:
    metadata:
      labels:
        app: k6
        target: product-service
    spec:
      containers:
        - name: k6
          image: grafana/k6:latest
          command: ["k6", "run", "--out", "json=/results/results.json", "/scripts/load-test.js"]
          env:
            - name: TARGET_URL
              value: "http://product-service.ecommerce.svc.cluster.local:8002"
            - name: TARGET_ENDPOINT
              value: "/products"
            - name: BASE_RPS
              value: "20"
            - name: PEAK_RPS
              value: "200"
            - name: PRODUCT_PAGE_SIZE
              value: "100"
            - name: PRODUCT_MAX_PAGE
              value: "12"
            - name: PRODUCT_SEARCH_TERMS
              value: "Laptop,Phone,Camera,Headphones,Keyboard,Monitor,Speaker,Charger"
            - name: INTERNAL_GATEWAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: internal-gateway-secret
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"
          volumeMounts:
            - name: k6-script
              mountPath: /scripts
            - name: k6-results
              mountPath: /results
      volumes:
        - name: k6-script
          configMap:
            name: k6-script-gradual
        - name: k6-results
          emptyDir: {}
      restartPolicy: Never
  backoffLimit: 0

