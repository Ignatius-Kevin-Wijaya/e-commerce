# k6 Load Test Scripts — Three load patterns for thesis experiments
# Blueprint Section 4, Layer 6: cpu 200m/500m, memory 256Mi/512Mi
# Blueprint Section 6: gradual ramp, sudden spike, oscillating
#
# Usage:
#   kubectl apply -f k6-job.yaml                          # Creates ConfigMap
#   kubectl create job k6-gradual --from=cronjob/dummy ... # Or use the Job templates below
#
# To run a specific pattern, apply the ConfigMap then one of the Job manifests.
# Delete the completed Job before running the next:
#   kubectl delete job k6-load-test -n ecommerce

---
# ── k6 Script: Gradual Ramp ─────────────────────────────────────────────────
# Linear increase from 20 → 200 RPS over 5 minutes
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script-gradual
  namespace: ecommerce
data:
  load-test.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    export const options = {
      scenarios: {
        gradual_ramp: {
          executor: 'ramping-arrival-rate',
          startRate: 20,
          timeUnit: '1s',
          preAllocatedVUs: 300,
          maxVUs: 500,
          stages: [
            { duration: '2m', target: 20 },   // Warm-up (excluded from analysis)
            { duration: '5m', target: 200 },   // Gradual ramp: 20 → 200 RPS
            { duration: '2m', target: 200 },   // Sustain peak
            { duration: '3m', target: 0 },     // Cooldown observation
          ],
        },
      },
      thresholds: {
        http_req_duration: ['p(95)<2000'],
        http_req_failed: ['rate<0.05'],
      },
    };

    const BASE_URL = __ENV.TARGET_URL || 'http://api-gateway.ecommerce.svc.cluster.local:80';
    const TARGET_ENDPOINT = __ENV.TARGET_ENDPOINT || '/products';
    const GATEWAY_SECRET = __ENV.INTERNAL_GATEWAY_SECRET || '';

    const params = {
      headers: {
        'X-Internal-Gateway-Secret': GATEWAY_SECRET,
      },
    };

    export default function () {
      const res = http.get(`${BASE_URL}${TARGET_ENDPOINT}`, params);
      check(res, {
        'status is 200': (r) => r.status === 200,
        'response time < 2000ms': (r) => r.timings.duration < 2000,
      });
    }

---
# ── k6 Script: Sudden Spike ─────────────────────────────────────────────────
# 50 RPS baseline → instant jump to 200 RPS at t=2min
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script-spike
