# k6 Load Test Scripts — product-service thesis experiments
# Updated for the thesis recovery plan:
#   - Search/pagination-heavy traffic against /products
#   - Env-driven BASE_RPS / PEAK_RPS for calibration ladders
#   - Higher k6 resources to avoid client-side A1 false failures
#
# Usage:
#   kubectl apply -f k6-job.yaml                          # Creates ConfigMaps + Jobs
#   The experiment runner only applies the ConfigMaps, then clones the Job
#   templates locally to create per-run Jobs with calibrated env overrides.

---
# ── k6 Script: Gradual Ramp ─────────────────────────────────────────────────
# Linear increase from BASE_RPS → PEAK_RPS over 5 minutes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script-gradual
  namespace: ecommerce
data:
  load-test.js: |
    import http from 'k6/http';
    import { check } from 'k6';

    const BASE_RPS = parseInt(__ENV.BASE_RPS || '20', 10);
    const PEAK_RPS = parseInt(__ENV.PEAK_RPS || '200', 10);
    const PAGE_SIZE = parseInt(__ENV.PRODUCT_PAGE_SIZE || '100', 10);
    const MAX_PAGE = parseInt(__ENV.PRODUCT_MAX_PAGE || '12', 10);
    const SEARCH_TERMS = (__ENV.PRODUCT_SEARCH_TERMS || 'Laptop,Phone,Camera,Headphones,Keyboard,Monitor,Speaker,Charger')
      .split(',')
      .map((term) => term.trim())
      .filter(Boolean);
    const PREALLOCATED_VUS = Math.max(400, PEAK_RPS * 2);
    const MAX_VUS = Math.max(1000, PEAK_RPS * 4);

    export const options = {
      scenarios: {
        gradual_ramp: {
          executor: 'ramping-arrival-rate',
          startRate: BASE_RPS,
          timeUnit: '1s',
          preAllocatedVUs: PREALLOCATED_VUS,
          maxVUs: MAX_VUS,
          stages: [
            { duration: '2m', target: BASE_RPS },
            { duration: '5m', target: PEAK_RPS },
            { duration: '2m', target: PEAK_RPS },
            { duration: '3m', target: 0 },
          ],
        },
      },
      thresholds: {
        http_req_duration: ['p(95)<2000'],
        http_req_failed: ['rate<0.05'],
      },
    };

    const BASE_URL = __ENV.TARGET_URL || 'http://product-service.ecommerce.svc.cluster.local:8002';
    const TARGET_ENDPOINT = __ENV.TARGET_ENDPOINT || '/products';
    const GATEWAY_SECRET = __ENV.INTERNAL_GATEWAY_SECRET || '';

    const params = {
      headers: {
        'X-Internal-Gateway-Secret': GATEWAY_SECRET,
      },
    };

    function buildUrl() {
      const search = SEARCH_TERMS[Math.floor(Math.random() * SEARCH_TERMS.length)];
      const page = 1 + Math.floor(Math.random() * MAX_PAGE);
      return `${BASE_URL}${TARGET_ENDPOINT}?page_size=${PAGE_SIZE}&search=${encodeURIComponent(search)}&page=${page}`;
    }

    export default function () {
      const res = http.get(buildUrl(), params);
      check(res, {
        'status is 200': (r) => r.status === 200,
        'returns paginated items': (r) => {
          try { return Array.isArray(JSON.parse(r.body).items); }
          catch (e) { return false; }
        },
        'response time < 2000ms': (r) => r.timings.duration < 2000,
      });
    }

---
