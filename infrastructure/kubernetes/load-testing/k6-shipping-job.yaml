---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-shipping-test-gradual
  namespace: ecommerce
  labels:
    app: k6
    target: shipping-rate-service
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: k6
        target: shipping-rate-service
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.46.0
          command: ["k6", "run", "--out", "json=/results/results.json", "/scripts/load-test.js"]
          env:
            - name: TARGET_URL
              value: "http://shipping-rate-service.ecommerce.svc.cluster.local:8006"
            - name: INTERNAL_GATEWAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: internal-gateway-secret
            - name: BASE_RPS
              value: "10"
            - name: PEAK_RPS
              value: "60"
            - name: SHIPPING_DESTINATION_ZONES
              value: "domestic,regional,remote"
            - name: SHIPPING_MAX_ITEMS
              value: "4"
            - name: SHIPPING_MIN_WEIGHT_GRAMS
              value: "200"
            - name: SHIPPING_MAX_WEIGHT_GRAMS
              value: "2500"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: results
              mountPath: /results
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"
      volumes:
        - name: scripts
          configMap:
            name: k6-shipping-script-gradual
        - name: results
          emptyDir: {}

