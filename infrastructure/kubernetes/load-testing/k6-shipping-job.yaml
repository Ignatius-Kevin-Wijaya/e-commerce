apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-shipping-script-oscillating
  namespace: ecommerce
data:
  load-test.js: |
    import http from 'k6/http';
    import { check } from 'k6';

    const BASE_VUS  = parseInt(__ENV.BASE_VUS  || '10', 10);
    const PEAK_VUS  = parseInt(__ENV.PEAK_VUS  || '80', 10);

    const MAX_ITEMS  = parseInt(__ENV.SHIPPING_MAX_ITEMS          || '4',    10);
    const MIN_WEIGHT = parseInt(__ENV.SHIPPING_MIN_WEIGHT_GRAMS   || '200',  10);
    const MAX_WEIGHT = parseInt(__ENV.SHIPPING_MAX_WEIGHT_GRAMS   || '2500', 10);
    const DESTINATION_ZONES = (__ENV.SHIPPING_DESTINATION_ZONES || 'domestic,regional,remote')
      .split(',').map((z) => z.trim()).filter(Boolean);

    // Oscillating: 2m warm-up → 3× cycles of (10s spike to peak, 80s hold, 10s drop, 80s low) → 3m cooldown
    // Total active cycles: 3 × (10s+80s+10s+80s) = 540s = 9m. Plus 2m warm + 3m cool = 12m ✓
    // (last cycle drops straight into cooldown — no need for final low-hold stage)
    export const options = {
      scenarios: {
        oscillating: {
          executor: 'ramping-vus',
          startVUs: BASE_VUS,
          stages: [
            { duration: '2m',   target: BASE_VUS }, // warm-up
            // Cycle 1
            { duration: '10s',  target: PEAK_VUS },
            { duration: '1m20s',target: PEAK_VUS },
            { duration: '10s',  target: BASE_VUS },
            { duration: '1m20s',target: BASE_VUS },
            // Cycle 2
            { duration: '10s',  target: PEAK_VUS },
            { duration: '1m20s',target: PEAK_VUS },
            { duration: '10s',  target: BASE_VUS },
            { duration: '1m20s',target: BASE_VUS },
            // Cycle 3 — final peak, then straight to cooldown
            { duration: '10s',  target: PEAK_VUS },
            { duration: '50s',  target: PEAK_VUS },
            { duration: '3m',   target: 0         }, // cooldown
          ],
          gracefulRampDown: '30s',
        },
      },
      thresholds: {
        http_req_duration: ['p(95)<3000'],
        http_req_failed:   ['rate<0.10'],
      },
    };

    const BASE_URL        = __ENV.TARGET_URL              || 'http://shipping-rate-service.ecommerce.svc.cluster.local:8006';
    const TARGET_ENDPOINT = __ENV.TARGET_ENDPOINT         || '/shipping/quotes';
    const GATEWAY_SECRET  = __ENV.INTERNAL_GATEWAY_SECRET || '';

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function buildPayload() {
      const items = [];
      const count = randomInt(1, MAX_ITEMS);
      for (let i = 0; i < count; i++) {
        items.push({
          sku:          `sku-${randomInt(1, 2000)}`,
          quantity:     randomInt(1, 3),
          weight_grams: randomInt(MIN_WEIGHT, MAX_WEIGHT),
        });
      }
      return JSON.stringify({
        destination_zone: DESTINATION_ZONES[randomInt(0, DESTINATION_ZONES.length - 1)],
        priority: Math.random() < 0.35 ? 'express' : 'standard',
        items,
      });
    }

    const params = {
      headers: {
        'Content-Type':              'application/json',
        'X-Internal-Gateway-Secret': GATEWAY_SECRET,
      },
      timeout: '30s',
    };

    export default function () {
      const res = http.post(`${BASE_URL}${TARGET_ENDPOINT}`, buildPayload(), params);
      check(res, {
        'status is 200':         (r) => r.status === 200,
        'returns quotes':        (r) => {
          try { return JSON.parse(r.body).quote_count >= 1; }
          catch (e) { return false; }
        },
        'response time <2000ms': (r) => r.timings.duration < 2000,
      });
    }

---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-shipping-test-gradual
  namespace: ecommerce
  labels:
    app: k6
    target: shipping-rate-service
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6
        target: shipping-rate-service
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.46.0
          command: ["k6", "run", "--out", "json=/results/results.json", "/scripts/load-test.js"]
          env:
            - name: TARGET_URL
              value: "http://shipping-rate-service.ecommerce.svc.cluster.local:8006"
            - name: INTERNAL_GATEWAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: internal-gateway-secret
            - name: BASE_VUS
              value: "10"
            - name: PEAK_VUS
              value: "80"  # calibrated: 0% errors, p95=5.1s B1, 5.4x B1/B2 ratio
            - name: SHIPPING_DESTINATION_ZONES
              value: "domestic,regional,remote"
            - name: SHIPPING_MAX_ITEMS
              value: "4"
            - name: SHIPPING_MIN_WEIGHT_GRAMS
              value: "200"
            - name: SHIPPING_MAX_WEIGHT_GRAMS
              value: "2500"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: results
              mountPath: /results
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"
      volumes:
        - name: scripts
          configMap:
            name: k6-shipping-script-gradual
        - name: results
          emptyDir: {}

