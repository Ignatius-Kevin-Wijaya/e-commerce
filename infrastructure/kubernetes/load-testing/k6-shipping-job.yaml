# k6 Shipping-Rate-Service Load Test Scripts — wait-bound thesis experiments
#
# Executor: ramping-vus (NOT ramping-arrival-rate)
# Rationale: shipping-rate-service is wait-dominant. With arrival-rate, k6 floods
# the OS TCP accept queue when responses slow down (positive feedback → cliff).
# With ramping-vus, each VU waits for its response before sending the next request,
# matching real client behaviour and shifting the bottleneck to the httpx carrier
# connection pool — producing gradual latency degradation under B1 load.
#
# VU math (pool=80 per pod, 3 carriers, avg hold=710ms):
#   B1 (1 pod) at 80 VUs: 80×3×0.71 = 170 concurrent carrier connections > 80 pool
#                          → httpx queues 90 extra → +~700ms queue wait → p95 ~1500ms
#   B2 (5 pods) at 80 VUs: 16 VUs/pod → 16×3×0.71 = 34/pod < 80 pool
#                          → no queuing → p95 stays at ~750ms baseline
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-shipping-script-gradual
  namespace: ecommerce
data:
  load-test.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    // VU-based parameters — each VU is one concurrent user
    const BASE_VUS  = parseInt(__ENV.BASE_VUS  || '10', 10);
    const PEAK_VUS  = parseInt(__ENV.PEAK_VUS  || '80', 10);

    const MAX_ITEMS  = parseInt(__ENV.SHIPPING_MAX_ITEMS          || '4',    10);
    const MIN_WEIGHT = parseInt(__ENV.SHIPPING_MIN_WEIGHT_GRAMS   || '200',  10);
    const MAX_WEIGHT = parseInt(__ENV.SHIPPING_MAX_WEIGHT_GRAMS   || '2500', 10);
    const DESTINATION_ZONES = (__ENV.SHIPPING_DESTINATION_ZONES || 'domestic,regional,remote')
      .split(',').map((z) => z.trim()).filter(Boolean);

    // Gradual ramp: 2m warm-up → 5m ramp to peak → 2m hold → 3m cooldown = 12m total
    export const options = {
      scenarios: {
        gradual_ramp: {
          executor: 'ramping-vus',
          startVUs: BASE_VUS,
          stages: [
            { duration: '2m',  target: BASE_VUS  }, // warm-up at baseline
            { duration: '5m',  target: PEAK_VUS  }, // gradual ramp to peak
            { duration: '2m',  target: PEAK_VUS  }, // hold at peak
            { duration: '3m',  target: 0          }, // cooldown
          ],
          gracefulRampDown: '30s',
        },
      },
      thresholds: {
        // B1 is expected to breach these; that is the thesis finding, not a failure
        http_req_duration: ['p(95)<3000'],
        http_req_failed:   ['rate<0.10'],
      },
    };

    const BASE_URL       = __ENV.TARGET_URL         || 'http://shipping-rate-service.ecommerce.svc.cluster.local:8006';
    const TARGET_ENDPOINT = __ENV.TARGET_ENDPOINT   || '/shipping/quotes';
    const GATEWAY_SECRET  = __ENV.INTERNAL_GATEWAY_SECRET || '';

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function buildPayload() {
      const items = [];
      const count = randomInt(1, MAX_ITEMS);
      for (let i = 0; i < count; i++) {
        items.push({
          sku:          `sku-${randomInt(1, 2000)}`,
          quantity:     randomInt(1, 3),
          weight_grams: randomInt(MIN_WEIGHT, MAX_WEIGHT),
        });
      }
      return JSON.stringify({
        destination_zone: DESTINATION_ZONES[randomInt(0, DESTINATION_ZONES.length - 1)],
        priority: Math.random() < 0.35 ? 'express' : 'standard',
        items,
      });
    }

    const params = {
      headers: {
        'Content-Type':              'application/json',
        'X-Internal-Gateway-Secret': GATEWAY_SECRET,
      },
      timeout: '30s', // generous — we want to measure latency, not cut it off
    };

    export default function () {
      const res = http.post(`${BASE_URL}${TARGET_ENDPOINT}`, buildPayload(), params);
      check(res, {
        'status is 200':       (r) => r.status === 200,
        'returns quotes':      (r) => {
          try { return JSON.parse(r.body).quote_count >= 1; }
          catch (e) { return false; }
        },
        'response time <2000ms': (r) => r.timings.duration < 2000,
      });
      // No sleep — VU immediately sends next request after response
      // This is correct: backpressure is built into the VU model
    }

