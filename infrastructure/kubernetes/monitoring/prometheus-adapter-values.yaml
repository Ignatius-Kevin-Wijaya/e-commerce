# prometheus-adapter Helm values for H3 experiment configuration
# Install / upgrade:
#   helm upgrade --install prometheus-adapter prometheus-community/prometheus-adapter \
#     --namespace monitoring -f prometheus-adapter-values.yaml
#
# ─── ROOT CAUSE OF ORIGINAL FailedGetPodsMetric FAILURE ──────────────────────
# The old config used `rules.custom` while leaving `rules.default: true`.
# The chart's built-in generic rule matched http_requests_total first and
# exposed it as "http_requests" (a raw counter, no rate). HPA asked for
# "http_requests_per_second" which never existed → FailedGetPodsMetric.
#
# FIX (2026-04-08, validated live on AKS):
#   1. Set rules.default: false to disable chart's built-in generic rules
#   2. List ALL rules explicitly, with http_requests_per_second FIRST
#   3. Use pod!="" in seriesQuery to prevent adapter querying non-pod series
#
# Live validation result:
#   Before: HPA status = FailedGetPodsMetric, desiredReplicas=0, never scaled
#   After:  HPA metric = 50222m at warmup → 180799m at 200 RPS spike
#           HPA scaled product-service: 1 → 2 → 3 → 4 pods ✅
# ─────────────────────────────────────────────────────────────────────────────

prometheus:
  url: http://prometheus.monitoring.svc.cluster.local
  port: 9090

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

rules:
  # Disable the Helm chart's built-in default rules.
  # We manage ALL rules explicitly below so priority is guaranteed.
  default: false

  custom:
    # ── RULE 1 (HIGHEST PRIORITY): http_requests_per_second ──────────────────
    # Maps http_requests_total → http_requests_per_second using 1m rate window.
    # Used by H3 (HPA + custom metric). Must be semantically identical to K1 (KEDA).
    #
    # FAIRNESS PROOF (H3 vs K1, threshold = 50 req/s per pod):
    #   H3 path: adapter returns per-pod rate via sum(...) by (pod)
    #            HPA type:Pods averageValue:50 computes:
    #            → desiredReplicas = ceil(N_pods × avg_pod_rps / 50)
    #
    #   K1 path: KEDA query = sum(rate(http_requests_total{job="svc"}[1m]))  ← total RPS
    #            KEDA threshold:50 (maps to HPA averageValue) computes:
    #            → desiredReplicas = ceil(total_rps / 50)
    #
    #   These are mathematically identical:
    #     ceil(N × (total/N) / 50) = ceil(total / 50) ✅
    #   Verified for 200 RPS/1 pod, 200 RPS/3 pods, 120 RPS/3 pods — all match.
    #
    - seriesQuery: 'http_requests_total{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: "^http_requests_total$"
        as: "http_requests_per_second"
      metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>}[1m])) by (<<.GroupBy>>)'

    # No generic default rules.
    #
    # Thesis rationale:
    # - H1/H2 use metrics-server for CPU and do not depend on prometheus-adapter.
    # - K1 uses the Prometheus scaler directly and does not depend on adapter rules.
    # - H3 only needs the single pods/http_requests_per_second custom metric.
    #
    # Keeping the generic Helm defaults forces the adapter to relist a much wider
    # metric universe (container_* plus many namespace-scoped series), which has
    # caused the single adapter pod to OOMKill repeatedly on AKS and break H3
    # mid-run with FailedGetPodsMetric. Scoping the adapter to the single thesis
    # metric removes that avoidable load.

# ── Verification commands (run after any install / upgrade) ─────────────────
#
# 1. Confirm metric is registered in the Custom Metrics API:
#    kubectl get --raw /apis/custom.metrics.k8s.io/v1beta1 | \
#      python3 -c "import json,sys; [print(r['name']) for r in json.load(sys.stdin)['resources'] if 'http_requests_per_second' in r['name']]"
#    Expected output:
#      namespaces/http_requests_per_second
#      pods/http_requests_per_second
#
# 2. Confirm per-pod values are returned (not <unknown>):
#    kubectl get --raw "/apis/custom.metrics.k8s.io/v1beta1/namespaces/ecommerce/pods/*/http_requests_per_second" | python3 -m json.tool
#    Expected: items list with each pod's "value" in milli-units (e.g. "244m" = 0.244 req/s at idle)
#
# 3. Deploy H3 HPA and confirm ScalingActive=True:
#    kubectl apply -f ../experiments/product-service/h3-hpa-custom-metric.yaml
#    kubectl describe hpa product-service-hpa-custom -n ecommerce | grep -A2 "ScalingActive"
#    Expected: Status=True, Reason=ValidMetricFound  (NOT FailedGetPodsMetric)
#
# 4. Confirm K1 KEDA uses same [1m] window and threshold=50 for fairness:
#    kubectl get scaledobject product-service-keda -n ecommerce -o yaml | grep -E "query|threshold"
