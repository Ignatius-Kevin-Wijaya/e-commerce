# Prometheus for AKS — with resource requests to prevent BestEffort eviction
# Blueprint Section 4, Layer 4: cpu 100m/500m, memory 256Mi/512Mi
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - services
  - endpoints
  - pods
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yaml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "alert_rules.yaml"

    scrape_configs:
      - job_name: "kubernetes-cadvisor"
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      - job_name: "kube-state-metrics"
        static_configs:
          - targets: ["kube-state-metrics.monitoring.svc.cluster.local:8080"]

      # Pod-level discovery for ecommerce services
      # WHY: static_configs can't discover autoscaled pods and produces
      # no pod/namespace labels. kubernetes_sd_configs scrapes each pod
      # individually, auto-discovers new replicas when HPA/KEDA scales,
      # and adds pod + namespace labels required by prometheus-adapter (H3)
      # and KEDA (K1).
      - job_name: "ecommerce-services"
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["ecommerce"]
        relabel_configs:
          # Only scrape pods matching our app services (not redis/postgres/k6)
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: (api-gateway|auth-service|product-service|cart-service|order-service|payment-service|shipping-rate-service|carrier-mock-service)
          # Set job label to the app name (e.g., "product-service")
          # This preserves backward compatibility with existing queries
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: job
          # Scrape at pod_ip:container_port (not service DNS)
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_container_port_number]
            action: replace
            regex: (.+);(.+)
            replacement: $1:$2
            target_label: __address__
          # Add pod name label (required by prometheus-adapter)
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Add namespace label (required by prometheus-adapter seriesQuery)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

  alert_rules.yaml: |
    groups:
      - name: ecommerce-alerts
        rules:
          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.job }}"
              description: "{{ $labels.job }} has >1% error rate for 5 minutes."

          - alert: HighLatencyP99
            expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2.0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p99 latency on {{ $labels.job }}"
              description: "{{ $labels.job }} p99 latency >2s for 5 minutes."

          - alert: HighCPUUsage
            expr: rate(process_cpu_seconds_total[5m]) > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on {{ $labels.job }}"

          - alert: PodRestarting
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is restarting"

          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.job }} is DOWN"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yaml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/
            - name: prometheus-storage
              mountPath: /prometheus/
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
