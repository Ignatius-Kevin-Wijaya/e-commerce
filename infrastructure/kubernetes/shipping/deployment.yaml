apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-rate-service
  namespace: ecommerce
  labels:
    app: shipping-rate-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipping-rate-service
  template:
    metadata:
      labels:
        app: shipping-rate-service
    spec:
      containers:
        - name: shipping-rate-service
          image: ecommerce.azurecr.io/shipping-rate-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8006
          env:
            - name: CARRIER_SERVICE_URL
              value: "http://carrier-mock-service:8007"
            - name: CARRIER_TIMEOUT_SECONDS
              value: "3.0"
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: INTERNAL_GATEWAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: internal-gateway-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"   # raised from 128Mi — prevents OOMKill at 60 RPS fan-out
            limits:
              cpu: "500m"
              memory: "512Mi"   # raised from 256Mi — 3x carrier fan-out needs headroom
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 10
            # periodSeconds=20, timeoutSeconds=10: matches auth-service probe tuning.
            # Under concurrent 3x fan-out at 30+ RPS the asyncio event loop is busy;
            # 5s timeout caused false-positive kills. 10s gives the loop time to respond.
            # failureThreshold=6 = 120s tolerance before any restart.
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: 8006
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10   # /ready calls carrier-mock-service; 5s was too short under load
            failureThreshold: 3
