apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-rate-service
  namespace: ecommerce
  labels:
    app: shipping-rate-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipping-rate-service
  template:
    metadata:
      labels:
        app: shipping-rate-service
    spec:
      containers:
        - name: shipping-rate-service
          image: ecommerce.azurecr.io/shipping-rate-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8006
          env:
            - name: CARRIER_SERVICE_URL
              value: "http://carrier-mock-service:8007"
            - name: CARRIER_TIMEOUT_SECONDS
              value: "10.0"  # raised: pool queuing shows as latency not timeout errors
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: INTERNAL_GATEWAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: internal-gateway-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"   # raised from 128Mi — prevents OOMKill at 60 RPS fan-out
            limits:
              cpu: "500m"
              memory: "512Mi"   # raised from 256Mi — 3x carrier fan-out needs headroom
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 10
            # Keep liveness tolerant under the saturated 1-rep B1 envelope.
            # On 2026-04-17, a 20s/10s probe still restarted the pod mid-run
            # even though memory stayed healthy; the problem was transient
            # event-loop starvation, not a deadlock. At the calibrated 10->80
            # B1 load, even 30s/15s/10 still caused a late-run restart, so we
            # intentionally stretch liveness beyond the experiment hot window.
            periodSeconds: 60
            timeoutSeconds: 15
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8006
            initialDelaySeconds: 5
            # /ready is now a lightweight local check, but keep some tolerance
            # so transient overload does not remove the only endpoint.
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
